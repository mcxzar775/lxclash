appId: com.longxing.client
productName: 龙行科技
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!aur/*'
  - '!images/*'
  - '!scripts/*'
  - '!extra/*'
  - '!tailwind.config.js'
  - '!postcss.config.js'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  - from: './extra/'
    to: ''
protocols:
  name: 'LongXing URI Scheme'
  schemes:
    - 'longxing'
    - 'clash'
    - 'mihomo'
win:
  target:
    - nsis
    - 7z
  artifactName: longxing-windows-${version}-${arch}-portable.${ext}
nsis:
  artifactName: longxing-windows-${version}-${arch}-setup.${ext}
  uninstallDisplayName: ${productName}
  allowToChangeInstallationDirectory: true
  oneClick: false
  perMachine: true
  createDesktopShortcut: always
mac:
  target:
    - dmg
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: false
  gatekeeperAssess: false
  notarize: false
  category: public.app-category.utilities
  artifactName: longxing-macos-${version}-${arch}.${ext}
dmg:
  title: 龙行科技 ${version}
linux:
  executableName: longxing-client
  icon: build/icon.png
  desktop:
    entry:
      Name: 龙行科技
      GenericName: Proxy Client
      Comment: 龙行科技 Mihomo 客户端
      MimeType: 'x-scheme-handler/longxing;x-scheme-handler/clash;x-scheme-handler/mihomo'
      Keywords: proxy;clash;mihomo;longxing;
      StartupWMClass: longxing-client
      Icon: longxing-client
  target:
    - deb
    - rpm
  maintainer: LongXing Technology
  category: Utility
  artifactName: longxing-linux-${version}-${arch}.${ext}
npmRebuild: true
publish: []
